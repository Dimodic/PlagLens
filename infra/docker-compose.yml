# PlagLens — main Docker Compose stack
# 7 application services + supporting infrastructure
# (course+submission merged into "course-submission";
#  reporting+audit+notification merged into "reporting")
# Usage: cp .env.example .env && docker compose up -d

name: plaglens

networks:
  plaglens-net:
    name: plaglens-net
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  kafka-data:
  minio-data:
  prometheus-data:
  grafana-data:
  vault-data:
  traefik-acme:

x-common-env: &common-env
  PLAGLENS_ENV: ${PLAGLENS_ENV:-dev}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  REDIS_URL: redis://redis:6379/0
  KAFKA_BROKERS: kafka:9092
  # Alias for services whose settings field is named kafka_bootstrap_servers
  # (e.g. integration) instead of kafka_brokers — without this they fall back to
  # the localhost default and fail to connect once Kafka is enabled.
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_SECURITY_PROTOCOL: PLAINTEXT
  S3_ENDPOINT: http://minio:9000
  S3_ACCESS_KEY: ${MINIO_ROOT_USER}
  S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  S3_REGION: us-east-1
  S3_DEFAULT_BUCKET: plaglens-default
  # MinIO aliases for services that read MINIO_* directly (submission, plagiarism, reporting)
  MINIO_ENDPOINT: minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
  MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
  MINIO_SECURE: "false"
  MINIO_REGION: us-east-1
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
  OTEL_SERVICE_NAME_PREFIX: plaglens
  VAULT_ADDR: http://vault:8200
  VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN}
  JWT_ISSUER: ${JWT_ISSUER:-https://plaglens.local}
  JWT_AUDIENCE: ${JWT_AUDIENCE:-plaglens-api}
  JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public.pem
  JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private.pem
  SERVICE_AUTH_SECRET: ${SERVICE_AUTH_SECRET:-service-auth-shared-secret-change-me}

x-svc-defaults: &svc-defaults
  restart: unless-stopped
  networks: [plaglens-net]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy

services:
  # ----------------------------------------------------------------------
  # Application services
  # ----------------------------------------------------------------------

  gateway:
    <<: *svc-defaults
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    image: plaglens/gateway:${IMAGE_TAG:-dev}
    container_name: plaglens-gateway
    environment:
      <<: *common-env
      SERVICE_NAME: gateway
      PORT: "8000"
      # Gateway is stateless — no Postgres connection.
      # Gateway settings use env_prefix="GATEWAY_".
      GATEWAY_BACKEND_IDENTITY: http://identity:8000
      # course + submission were merged into one service (course-submission).
      # Both routing-table backends resolve to the same combined service so the
      # static routing table (which still names "course"/"submission") needs no
      # change.
      GATEWAY_BACKEND_COURSE: http://course-submission:8000
      GATEWAY_BACKEND_SUBMISSION: http://course-submission:8000
      GATEWAY_BACKEND_INTEGRATION: http://integration:8000
      GATEWAY_BACKEND_PLAGIARISM: http://plagiarism:8000
      GATEWAY_BACKEND_AI_ANALYSIS: http://ai-analysis:8000
      # reporting + audit + notification merged into one "reporting" service.
      # All three routing-table backends resolve to it (routing table unchanged).
      GATEWAY_BACKEND_NOTIFICATION: http://reporting:8000
      GATEWAY_BACKEND_REPORTING: http://reporting:8000
      GATEWAY_BACKEND_AUDIT: http://reporting:8000
      GATEWAY_JWKS_URL: http://identity:8000/api/v1/.well-known/jwks.json
      GATEWAY_REDIS_URL: redis://redis:6379/0
      GATEWAY_JWT_ISSUER: ${JWT_ISSUER:-https://plaglens.local}
      GATEWAY_JWT_AUDIENCE: ${JWT_AUDIENCE:-plaglens-api}
      # Dev/CI rate limits — very permissive to allow parallel E2E. Tighten in prod.
      GATEWAY_RATE_LIMIT_PER_IP_RPM: "10000"
      GATEWAY_RATE_LIMIT_PER_USER_RPM: "10000"
      GATEWAY_RATE_LIMIT_WRITE_RPM: "10000"
      GATEWAY_RATE_LIMIT_AUTH_RPM: "10000"
      GATEWAY_RATE_LIMIT_RUN_RPH: "10000"
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-https://localhost,http://localhost:5173}
    volumes:
      # Mount JWT keypair (read-only) so the gateway can verify tokens locally
      # if it ever falls back from JWKS. Generated by `make gen-keys`.
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.gateway.rule=Host(`${PUBLIC_HOSTNAME:-localhost}`) && PathPrefix(`/api`)
      - traefik.http.routers.gateway.entrypoints=websecure
      - traefik.http.routers.gateway.tls=true
      - traefik.http.routers.gateway.tls.certresolver=letsencrypt
      - traefik.http.services.gateway.loadbalancer.server.port=8000
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      identity: { condition: service_healthy }

  identity:
    <<: *svc-defaults
    build:
      context: ..
      dockerfile: services/identity/Dockerfile
    image: plaglens/identity:${IMAGE_TAG:-dev}
    container_name: plaglens-identity
    environment:
      <<: *common-env
      SERVICE_NAME: identity
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://identity_app:${POSTGRES_PASSWORD}@postgres:5432/plaglens
      DATABASE_SCHEMA: identity
      ACCESS_TOKEN_TTL_SECONDS: "900"
      REFRESH_TOKEN_TTL_DAYS: "30"
      OAUTH_GOOGLE_CLIENT_ID: ${OAUTH_GOOGLE_CLIENT_ID:-}
      OAUTH_GOOGLE_CLIENT_SECRET: ${OAUTH_GOOGLE_CLIENT_SECRET:-}
      OAUTH_YANDEX_CLIENT_ID: ${OAUTH_YANDEX_CLIENT_ID:-}
      OAUTH_YANDEX_CLIENT_SECRET: ${OAUTH_YANDEX_CLIENT_SECRET:-}
      OAUTH_GITHUB_CLIENT_ID: ${OAUTH_GITHUB_CLIENT_ID:-}
      OAUTH_GITHUB_CLIENT_SECRET: ${OAUTH_GITHUB_CLIENT_SECRET:-}
      # Public origin used to build the ``redirect_uri`` that Yandex / Google
      # / Stepik / GitHub call back into. Defaults to localhost (dev) — must
      # be set to the public HTTPS hostname in any non-dev deployment so the
      # external provider can reach our /api/v1/auth/oauth/{provider}/callback.
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-http://localhost:8000}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@plaglens.local}
      # Identity forwards transactional emails (verify / reset / invite /
      # email-change) to the reporting service's internal endpoint
      # (reporting hosts the notification sub-module after the 10→7 merge).
      NOTIFICATION_BASE_URL: http://reporting:8000
      NOTIFICATION_INTERNAL_TOKEN: ${NOTIFICATION_INTERNAL_TOKEN:-}
      # Used to build the absolute callback URL inside the email body. Falls
      # back to a relative path when unset.
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://${PUBLIC_HOSTNAME:-localhost}}
      # Bootstrap admin (entrypoint runs `python -m
      # identity_service.bootstrap_admin` on startup if EMAIL is set).
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_TENANT_SLUG: ${BOOTSTRAP_ADMIN_TENANT_SLUG:-system}
      BOOTSTRAP_ADMIN_TOKEN: ${BOOTSTRAP_ADMIN_TOKEN:-}
    volumes:
      # Mount JWT keypair (read-only) — Identity is the JWT signer.
      # Generated by `make gen-keys`.
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # course + submission were merged into ONE service (Phase 3 refactor).
  # One Postgres DB, two schemas (course + submission); the course_submission_app
  # role owns both. submission resolves course/assignment data IN-PROCESS
  # (InProcessCourseClient) instead of over HTTP. The src packages
  # (course_service, submission_service) live on as libraries imported by
  # course_submission_service.
  course-submission:
    <<: *svc-defaults
    build:
      context: ..
      dockerfile: services/course-submission/Dockerfile
    image: plaglens/course-submission:${IMAGE_TAG:-dev}
    container_name: plaglens-course-submission
    environment:
      <<: *common-env
      SERVICE_NAME: course-submission
      PORT: "8000"
      # One DB, two schemas. The course_submission_app role owns both and uses
      # search_path=submission,public; submission's ORM is unqualified (resolves
      # via search_path) while course is always schema-qualified to "course".
      DATABASE_URL: postgresql+asyncpg://course_submission_app:${POSTGRES_PASSWORD}@postgres:5432/plaglens
      COURSE_DB_SCHEMA: course
      # Course's Kafka producer + consumer are gated by KAFKA_ENABLED (default
      # off in code). Turn them on so course/assignment domain events actually
      # flow (submission already publishes; this completes the course side).
      KAFKA_ENABLED: "true"
      IDENTITY_BASE_URL: http://identity:8000
      # COURSE_BASE_URL is unused at runtime (in-process client) — kept pointing
      # at self so any stray HTTP fallback is harmless.
      COURSE_BASE_URL: http://course-submission:8000
      MAX_FILE_SIZE_MB: "50"
      MAX_SUBMISSION_SIZE_MB: "200"
    volumes:
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      minio: { condition: service_healthy }

  integration:
    <<: *svc-defaults
    build:
      context: ..
      dockerfile: services/integration/Dockerfile
    image: plaglens/integration:${IMAGE_TAG:-dev}
    container_name: plaglens-integration
    # Local-only secrets (Yandex/Stepik client_secret, Telegram bot token, etc.)
    # are loaded from `services/integration/.env.local` if it exists. The file
    # is gitignored (.env.*); copy `.env.example` and fill in real values.
    env_file:
      - path: ../services/integration/.env.local
        required: false
    environment:
      <<: *common-env
      SERVICE_NAME: integration
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://integration_app:${POSTGRES_PASSWORD}@postgres:5432/plaglens
      DATABASE_SCHEMA: integration
      # Integration's Kafka producer + consumer are gated by ENABLE_KAFKA
      # (default off in code) — without this it publishes import/config events
      # only to an in-memory fallback. Turn it on for the real bus.
      ENABLE_KAFKA: "true"
      SUBMISSION_BASE_URL: http://course-submission:8000
      COURSE_BASE_URL: http://course-submission:8000
      # When the historical ``course`` + ``submission`` services got
      # merged into ``course-submission`` the legacy *_SERVICE_URL env
      # names were left pointing at the old (now non-existent) hosts.
      # /import-as-homework calls ``settings.course_service_url`` and
      # ``submission_service_url`` directly — without the override
      # below it gets ``http://course:8000`` and dies with
      # '[Errno -3] Temporary failure in name resolution'.
      COURSE_SERVICE_URL: http://course-submission:8000
      SUBMISSION_SERVICE_URL: http://course-submission:8000
      # Public-facing host of the SPA — used to render OAuth-redirect
      # defaults in /admin/integrations → Авторизация. Without this the
      # admin sees http://localhost:5173/… and pastes it to Yandex/etc,
      # which then refuses the OAuth dance from the deployed host.
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://${PUBLIC_HOSTNAME:-localhost}}
      # Autosync scheduler — APScheduler in-process, fenced by Redis lock so
      # multiple integration replicas don't double-sync.
      ENABLE_SCHEDULER: ${ENABLE_SCHEDULER:-true}
      SCHEDULER_INTERVAL_SECONDS: ${SCHEDULER_INTERVAL_SECONDS:-300}
      # OAuth client_id/client_secret/redirect_uri/scope intentionally NOT
      # listed here — they come from `services/integration/.env.local` via the
      # `env_file:` directive above. Listing them with `${...:-}` here would
      # override env_file with empty strings (compose precedence: environment >
      # env_file).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: /run/secrets/google_sa.json
      WEBHOOK_HMAC_SECRET: ${WEBHOOK_HMAC_SECRET}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  plagiarism:
    <<: *svc-defaults
    build:
      context: ..
      dockerfile: services/plagiarism/Dockerfile
    image: plaglens/plagiarism:${IMAGE_TAG:-dev}
    container_name: plaglens-plagiarism
    environment:
      <<: *common-env
      SERVICE_NAME: plagiarism
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://plagiarism_app:${POSTGRES_PASSWORD}@postgres:5432/plaglens
      DATABASE_SCHEMA: plagiarism
      SUBMISSION_BASE_URL: http://course-submission:8000
      # MOSS / Codequiry env left in place but unused — adapters were
      # removed; provider registry only knows ``dolos`` now.
      MOSS_USER_ID: ${MOSS_USER_ID:-}
      CODEQUIRY_API_KEY: ${CODEQUIRY_API_KEY:-}
      # No DOLOS_BIN_PATH — Dockerfile installs the CLI to /usr/bin/dolos
      # via NodeSource (npm -g), which is on $PATH, so the default
      # ``dolos`` resolves correctly. Setting an absolute path here is a
      # foot-gun: a wrong value (e.g. the historical /usr/local/bin)
      # bypasses PATH and crashes the run with "No such file".
      MAX_CONCURRENT_RUNS: "3"
    volumes:
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  ai-analysis:
    <<: *svc-defaults
    build:
      context: ..
      dockerfile: services/ai-analysis/Dockerfile
    image: plaglens/ai-analysis:${IMAGE_TAG:-dev}
    container_name: plaglens-ai-analysis
    environment:
      <<: *common-env
      SERVICE_NAME: ai-analysis
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://ai_analysis_app:${POSTGRES_PASSWORD}@postgres:5432/plaglens
      DATABASE_SCHEMA: ai_analysis
      SUBMISSION_BASE_URL: http://course-submission:8000
      PLAGIARISM_BASE_URL: http://plagiarism:8000
      LLM_DEFAULT_PROVIDER: ${LLM_DEFAULT_PROVIDER:-openai}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-gpt-4o-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      YANDEX_GPT_API_KEY: ${YANDEX_GPT_API_KEY:-}
      YANDEX_GPT_FOLDER_ID: ${YANDEX_GPT_FOLDER_ID:-}
      GIGACHAT_API_KEY: ${GIGACHAT_API_KEY:-}
      SELF_HOSTED_LLM_BASE_URL: ${SELF_HOSTED_LLM_BASE_URL:-}
      LLM_CACHE_TTL_DAYS: "14"
      DEFAULT_TENANT_BUDGET_USD: "100"
    volumes:
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  # reporting + audit + notification merged into ONE "reporting" service
  # (Phase 4 refactor). One Postgres DB, three schemas (reporting + audit +
  # notification); the reporting_app role owns all three. Each sub-service
  # keeps its own engine + Kafka consumer group; reporting<->audit talk via
  # in-container loopback (their *_BASE_URL point at self).
  reporting:
    <<: *svc-defaults
    build:
      context: ..
      dockerfile: services/reporting/Dockerfile
    image: plaglens/reporting:${IMAGE_TAG:-dev}
    container_name: plaglens-reporting
    environment:
      <<: *common-env
      SERVICE_NAME: reporting
      PORT: "8000"
      DATABASE_URL: postgresql+asyncpg://reporting_app:${POSTGRES_PASSWORD}@postgres:5432/plaglens
      # reporting reads *_SERVICE_BASE_URL (NOT *_BASE_URL); point at the merged
      # course-submission service, identity + integration, and SELF for the two
      # internal reporting<->audit hops.
      COURSE_SERVICE_BASE_URL: http://course-submission:8000
      SUBMISSION_SERVICE_BASE_URL: http://course-submission:8000
      IDENTITY_SERVICE_BASE_URL: http://identity:8000
      INTEGRATION_SERVICE_BASE_URL: http://integration:8000
      AUDIT_SERVICE_BASE_URL: http://reporting:8000
      REPORTING_BASE_URL: http://reporting:8000
      GOOGLE_SERVICE_ACCOUNT_JSON_PATH: /run/secrets/google_sa.json
      # notification email transport (dev → Mailhog; these match the real
      # EMAIL_TRANSPORT/SMTP_* setting names the service reads).
      EMAIL_TRANSPORT: ${EMAIL_TRANSPORT:-smtp}
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@plaglens.local}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: ${MAILGUN_DOMAIN:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # Shared bearer secret for the internal email-direct endpoint
      # called by identity (transactional verify / reset / invite mails).
      # Empty in dev — notification only checks the token when AUTH_DISABLED=false.
      NOTIFICATION_INTERNAL_TOKEN: ${NOTIFICATION_INTERNAL_TOKEN:-}
      # Fernet key used to encrypt SMTP password / Mailgun API key stored
      # in ``email_transport_config``. Generate with
      #   python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())'
      # When empty, the admin email-config page reads fine but Save returns
      # a 503 «EMAIL_SECRET_KEY is not configured».
      EMAIL_SECRET_KEY: ${EMAIL_SECRET_KEY:-}
      # NB: deliberately NOT setting KAFKA_CONSUMER_GROUP — reporting AND
      # notification both read it; each must keep its own default group so they
      # don't share one consumer group (audit uses KAFKA_GROUP_ID separately).
    volumes:
      - ./secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
      minio: { condition: service_healthy }

  # ----------------------------------------------------------------------
  # Frontend (Vite SPA served by nginx; reverse-proxies /api → gateway)
  # ----------------------------------------------------------------------

  frontend:
    restart: unless-stopped
    networks: [plaglens-net]
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    image: plaglens/frontend:${IMAGE_TAG:-dev}
    container_name: plaglens-frontend
    ports:
      # localhost-only; public access is via Traefik (443) over the docker net.
      - "127.0.0.1:5173:80"
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1 (not localhost): inside the container `localhost` resolves to
      # ::1 first, but nginx binds IPv4 only -> the check was always failing
      # ("connection refused") even though the app served fine.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - traefik.enable=true
      - traefik.http.routers.frontend.rule=Host(`${PUBLIC_HOSTNAME:-localhost}`)
      - traefik.http.routers.frontend.entrypoints=websecure
      - traefik.http.routers.frontend.tls=true
      - traefik.http.services.frontend.loadbalancer.server.port=80

  # ----------------------------------------------------------------------
  # Data stores
  # ----------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: plaglens-postgres
    restart: unless-stopped
    networks: [plaglens-net]
    environment:
      POSTGRES_DB: plaglens
      POSTGRES_USER: ${POSTGRES_SUPERUSER:-plaglens_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
      APP_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # localhost-only (services reach it as postgres:5432 over the docker net).
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_SUPERUSER:-plaglens_admin} -d plaglens"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  redis:
    image: redis:7-alpine
    container_name: plaglens-redis
    restart: unless-stopped
    networks: [plaglens-net]
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      # localhost-only (services reach it as redis:6379 over the docker net).
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: plaglens-kafka
    restart: unless-stopped
    networks: [plaglens-net]
    ports:
      # localhost-only (services reach it as kafka:9092 over the docker net).
      - "127.0.0.1:${KAFKA_PORT:-9092}:9092"
      - "127.0.0.1:9094:9094"
    environment:
      # KRaft (Zookeeper-less) single-node setup
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: "168"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_MIN_INSYNC_REPLICAS: "1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    container_name: plaglens-kafka-init
    networks: [plaglens-net]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/scripts/create-topics.sh"]
    environment:
      KAFKA_BROKERS: kafka:9092
      KAFKA_PARTITIONS: "3"
      KAFKA_REPLICATION_FACTOR: "1"
    volumes:
      - ./init/kafka:/scripts:ro
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: plaglens-kafka-ui
    restart: unless-stopped
    networks: [plaglens-net]
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      # localhost-only admin UI (no auth) — reach via SSH tunnel.
      - "127.0.0.1:${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: plaglens
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
      AUTH_TYPE: DISABLED

  minio:
    image: minio/minio:latest
    container_name: plaglens-minio
    restart: unless-stopped
    networks: [plaglens-net]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_REGION_NAME: us-east-1
    ports:
      # localhost-only (services reach it as minio:9000 over the docker net;
      # the browser downloads files via same-origin service endpoints, never MinIO).
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  minio-init:
    image: minio/mc:latest
    container_name: plaglens-minio-init
    networks: [plaglens-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/create-buckets.sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./init/minio:/scripts:ro
    restart: "no"

  # ----------------------------------------------------------------------
  # Observability
  # ----------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: plaglens-prometheus
    restart: unless-stopped
    networks: [plaglens-net]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      # localhost-only; admin UI reachable via Traefik at prometheus.<host> (basic-auth).
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    labels:
      - traefik.enable=true
      - traefik.http.routers.prometheus.rule=Host(`prometheus.${PUBLIC_HOSTNAME:-localhost}`)
      - traefik.http.routers.prometheus.entrypoints=websecure
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.routers.prometheus.tls.certresolver=letsencrypt
      - traefik.http.routers.prometheus.middlewares=obs-auth@file,secure-headers@file
      - traefik.http.services.prometheus.loadbalancer.server.port=9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    build:
      context: ./grafana
      dockerfile: Dockerfile
    image: plaglens/grafana:prod
    container_name: plaglens-grafana
    restart: unless-stopped
    networks: [plaglens-net]
    depends_on:
      - prometheus
    ports:
      # localhost-only; admin UI reachable via Traefik at grafana.<host> (basic-auth).
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.${PUBLIC_HOSTNAME:-localhost}`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.tls.certresolver=letsencrypt
      - traefik.http.routers.grafana.middlewares=obs-auth@file,secure-headers@file
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Anonymous = Viewer: the default (non-logged-in) view is clean & read-only
      # — no Connections/Administration/edit chrome. Still gated by Traefik
      # basic-auth; the admin can still sign in to edit.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_NAME: "Main Org."
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
      # Grafana is served at the root of its own subdomain behind Traefik (TLS).
      GF_SERVER_DOMAIN: grafana.${PUBLIC_HOSTNAME:-localhost}
      GF_SERVER_ROOT_URL: https://grafana.${PUBLIC_HOSTNAME:-localhost}/
      # Declutter the left nav — this is a read-only dashboards instance, so hide
      # Explore, Alerting and the news feed. (Connections/Administration are core
      # admin sections with no toggle; collapse the menu to hide those too.)
      GF_EXPLORE_ENABLED: "false"
      GF_UNIFIED_ALERTING_ENABLED: "false"
      GF_NEWS_NEWS_FEED_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: "dark"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  jaeger:
    image: jaegertracing/all-in-one:1.60
    container_name: plaglens-jaeger
    restart: unless-stopped
    networks: [plaglens-net]
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      # UI is localhost-only; admin access via Traefik at jaeger.<host> (basic-auth).
      - "127.0.0.1:16686:16686"   # UI
      - "127.0.0.1:4317:4317"     # OTLP gRPC (services emit to jaeger:4317 over the docker net)
      - "127.0.0.1:4318:4318"     # OTLP HTTP
    labels:
      - traefik.enable=true
      - traefik.http.routers.jaeger.rule=Host(`jaeger.${PUBLIC_HOSTNAME:-localhost}`)
      - traefik.http.routers.jaeger.entrypoints=websecure
      - traefik.http.routers.jaeger.tls=true
      - traefik.http.routers.jaeger.tls.certresolver=letsencrypt
      - traefik.http.routers.jaeger.middlewares=obs-auth@file,secure-headers@file
      - traefik.http.services.jaeger.loadbalancer.server.port=16686

  # ----------------------------------------------------------------------
  # Secrets / Edge / Email mock
  # ----------------------------------------------------------------------

  vault:
    image: hashicorp/vault:1.15
    container_name: plaglens-vault
    restart: unless-stopped
    networks: [plaglens-net]
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_ADDR: http://0.0.0.0:8200
    ports:
      # localhost-only (dev-mode root token) — reach via SSH tunnel.
      - "127.0.0.1:${VAULT_PORT:-8200}:8200"
    volumes:
      - vault-data:/vault/file
      - ./init/vault:/vault/init:ro
    command: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  vault-init:
    image: hashicorp/vault:1.15
    container_name: plaglens-vault-init
    networks: [plaglens-net]
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: ${VAULT_DEV_ROOT_TOKEN}
    entrypoint: ["/bin/sh", "/init/seed-secrets.sh"]
    volumes:
      - ./init/vault:/init:ro
    restart: "no"

  traefik:
    image: traefik:v3.1
    container_name: plaglens-traefik
    restart: unless-stopped
    networks: [plaglens-net]
    # Override the ACME email via CLI flag — traefik v3 expands env vars in
    # command-line flags but NOT inside the static YAML. Falling back to the
    # YAML's hard-coded admin@plaglens.ru if unset.
    command:
      - --certificatesresolvers.letsencrypt.acme.email=${LETS_ENCRYPT_EMAIL:-admin@plaglens.ru}
    ports:
      - "80:80"
      - "443:443"
      # Dashboard (insecure: true) is localhost-only — reach via SSH tunnel.
      - "127.0.0.1:${TRAEFIK_DASHBOARD_PORT:-8081}:8080"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-acme:/etc/traefik/acme
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # LE rejects non-public TLDs (e.g. .local), so the default must be a
      # syntactically valid public address even if no real mailbox lives there.
      LETS_ENCRYPT_EMAIL: ${LETS_ENCRYPT_EMAIL:-admin@plaglens.ru}

  mailhog:
    image: mailhog/mailhog:latest
    container_name: plaglens-mailhog
    restart: unless-stopped
    networks: [plaglens-net]
    ports:
      # localhost-only mail mock — reach the UI via SSH tunnel.
      - "127.0.0.1:${MAILHOG_SMTP_PORT:-1025}:1025"
      - "127.0.0.1:${MAILHOG_UI_PORT:-8025}:8025"

  # ----- autosync now runs in-process inside `integration` (APScheduler) ----
  # The previous bash-loop sidecar (`tools/scripts/autosync.py`) is kept on
  # disk as a fallback for ad-hoc cron jobs / CI smoke checks, but the live
  # scheduler is the FastAPI lifespan job.
