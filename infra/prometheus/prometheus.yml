# PlagLens — Prometheus scrape configuration.
# One job per microservice, scraping `/metrics` on the in-cluster port 8000.
# Plus self + infra exporters when available.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: plaglens-dev
    env: dev

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8000"]
        labels: { service: gateway }

  - job_name: identity
    metrics_path: /metrics
    static_configs:
      - targets: ["identity:8000"]
        labels: { service: identity }

  # course + submission merged into one service.
  - job_name: course-submission
    metrics_path: /metrics
    static_configs:
      - targets: ["course-submission:8000"]
        labels: { service: course-submission }

  - job_name: integration
    metrics_path: /metrics
    static_configs:
      - targets: ["integration:8000"]
        labels: { service: integration }

  - job_name: plagiarism
    metrics_path: /metrics
    static_configs:
      - targets: ["plagiarism:8000"]
        labels: { service: plagiarism }

  - job_name: ai-analysis
    metrics_path: /metrics
    static_configs:
      - targets: ["ai-analysis:8000"]
        labels: { service: ai-analysis }

  # reporting + audit + notification merged into one service.
  - job_name: reporting-audit-notification
    metrics_path: /metrics
    static_configs:
      - targets: ["reporting-audit-notification:8000"]
        labels: { service: reporting-audit-notification }

  - job_name: traefik
    metrics_path: /metrics
    static_configs:
      - targets: ["traefik:8080"]
        labels: { service: traefik }
