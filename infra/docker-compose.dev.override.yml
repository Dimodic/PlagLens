# PlagLens — dev override.
# Layered on top of docker-compose.yml for local development. It:
#   - exposes every application service on a host port (direct debugging),
#   - relaxes healthcheck timings (more retries / longer timeout, kinder to
#     slow machines and cold starts),
#   - adds a Vite dev server (frontend-dev) with hot module reload.
#
# NOTE — no backend hot-reload. Each service image bakes the code in: the wheel
# is pip-installed into site-packages and the entrypoint execs a fixed
# `uvicorn <pkg>_service.main:app`. There is no editable source on disk to
# watch, so edit + `docker compose build <svc>` (or `make build`) to pick up
# Python changes. Frontend hot-reload IS real — see the frontend-dev service.
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.override.yml up -d

name: plaglens

# Relaxed healthcheck *timings* only. Deliberately NO `test:` here: a test key
# would clobber each service's correct health path from the base file (most
# expose /healthz, reporting exposes /api/v1/healthz). Compose merges these
# four keys on top of the base healthcheck mapping and leaves `test` intact.
x-svc-dev-defaults: &svc-dev-defaults
  healthcheck:
    interval: 30s
    timeout: 10s
    retries: 10
    start_period: 60s

services:
  gateway:
    <<: *svc-dev-defaults
    ports:
      - "8001:8000"

  identity:
    <<: *svc-dev-defaults
    ports:
      - "8002:8000"

  # course + submission are merged into one service (host port 8003).
  course-submission:
    <<: *svc-dev-defaults
    ports:
      - "8003:8000"

  integration:
    <<: *svc-dev-defaults
    ports:
      - "8005:8000"

  plagiarism:
    <<: *svc-dev-defaults
    ports:
      - "8006:8000"

  ai-analysis:
    <<: *svc-dev-defaults
    ports:
      - "8007:8000"

  # reporting + audit + notification merged into one service; expose a host
  # port for direct debugging.
  reporting-audit-notification:
    <<: *svc-dev-defaults
    ports:
      - "8008:8000"

  postgres:
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka:
    healthcheck:
      interval: 30s
      timeout: 20s
      retries: 20
      start_period: 90s

  minio:
    healthcheck:
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ----- Vite dev server with hot module reload --------------------------
  # Runs alongside the prod-style nginx (which still serves :5173 from the
  # baked-in dist). Use http://localhost:5174 during development — every save
  # is reflected in the browser instantly without `docker compose build`.
  #
  # Talks to the existing gateway at gateway:8000 for /api requests via Vite's
  # built-in proxy (see frontend/vite.config.ts:server.proxy).
  frontend-dev:
    image: node:20-alpine
    container_name: plaglens-frontend-dev
    restart: unless-stopped
    networks: [plaglens-net]
    working_dir: /app
    environment:
      # `.env.development` hardcodes VITE_API_BASE_URL=http://localhost:8000/api/v1,
      # which works for `npm run dev` on a dev's host machine but is wrong inside
      # docker (no gateway listening on container's localhost). Force a relative
      # URL so the request goes back to Vite (5173 in-container, 5174 on host)
      # and gets proxied via `server.proxy` to `gateway:8000`.
      VITE_API_BASE_URL: /api/v1
      VITE_API_PROXY_TARGET: http://gateway:8000
      VITE_HMR_CLIENT_PORT: "5174"  # host-visible port so HMR ws connects back
      CHOKIDAR_USEPOLLING: "true"   # reliable file-watch on Windows bind mounts
      WATCHPACK_POLLING: "true"
    volumes:
      - ../frontend:/app
      - /app/node_modules            # keep container's node_modules separate
    ports:
      - "5174:5173"
    command: >
      sh -c "
        if [ ! -d node_modules ] || [ ! -e node_modules/.installed ]; then
          npm install --legacy-peer-deps && touch node_modules/.installed;
        fi;
        # Override .env.development for the docker case: gateway is at
        # `gateway:8000` on the docker network, never on the container's
        # localhost. .env.development.local has higher priority than
        # .env.development (Vite convention) and is gitignored by default.
        echo 'VITE_API_BASE_URL=/api/v1' > .env.development.local;
        npm run dev -- --host 0.0.0.0 --port 5173
      "
