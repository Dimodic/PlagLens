# PlagLens — Grafana datasources.
# Wires Prometheus and Jaeger as default datasources at boot.
# Fixed `uid`s so provisioned dashboards reference them deterministically
# ("uid": "prometheus") instead of relying on default-datasource fallback.

apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: 15s

  - name: Jaeger
    uid: jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    editable: false
    jsonData:
      tracesToLogsV2: {}
