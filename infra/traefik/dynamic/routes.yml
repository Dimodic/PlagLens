# PlagLens — Traefik dynamic config.
# Most routes are derived from container labels (`traefik.enable=true`). The
# gateway/frontend and the observability panels (Grafana/Prometheus/Jaeger) are
# routed via labels (they need `${PUBLIC_HOSTNAME}`, which the file provider does
# NOT expand). This file holds the dev-only `*.localhost` routes for the
# remaining infra UIs (kafka-ui, mailhog, MinIO console, Vault) plus the shared
# middlewares referenced from labels (`secure-headers@file`, `obs-auth@file`).

http:
  middlewares:
    secure-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        browserXssFilter: true
        referrerPolicy: strict-origin-when-cross-origin
        forceSTSHeader: true

    rate-limit-public:
      rateLimit:
        average: 100
        burst: 200

    # Admin-only gate for the observability panels (Grafana/Prometheus/Jaeger),
    # referenced from their container labels as `obs-auth@file`. The password is
    # stored ONLY as this apr1 hash; the plaintext is held by the admin.
    obs-auth:
      basicAuth:
        # Strip the Authorization header after validating, so it does NOT leak
        # into the upstream — otherwise Grafana tries to use admin:<gate-pw> as
        # its OWN credentials, fails, and (with anonymous on) drops to Viewer.
        removeHeader: true
        users:
          - "admin:$apr1$/q617WnV$iC7lG3OvLcVcLb0bLphm.0"

  routers:
    kafka-ui:
      rule: "Host(`kafka.localhost`)"
      entryPoints: [websecure]
      service: kafka-ui
      tls: {}

      middlewares: [secure-headers]

    mailhog:
      rule: "Host(`mail.localhost`)"
      entryPoints: [websecure]
      service: mailhog
      tls: {}

      middlewares: [secure-headers]

    minio:
      rule: "Host(`minio.localhost`)"
      entryPoints: [websecure]
      service: minio
      tls: {}

      middlewares: [secure-headers]

    vault:
      rule: "Host(`vault.localhost`)"
      entryPoints: [websecure]
      service: vault
      tls: {}

      middlewares: [secure-headers]

  services:
    kafka-ui:
      loadBalancer:
        servers:
          - url: "http://kafka-ui:8080"
    mailhog:
      loadBalancer:
        servers:
          - url: "http://mailhog:8025"
    minio:
      loadBalancer:
        servers:
          - url: "http://minio:9001"
    vault:
      loadBalancer:
        servers:
          - url: "http://vault:8200"
