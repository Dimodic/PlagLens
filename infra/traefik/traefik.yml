# PlagLens — Traefik static config.
# Edge proxy: HTTP→HTTPS redirect, ACME (Let's Encrypt staging) for dev,
# Docker provider for service discovery, file provider for static routes.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true   # Dev only — dashboard is exposed on :8080. Disable in prod.

log:
  level: INFO

accessLog: {}

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
  metrics:
    address: ":8082"

metrics:
  prometheus:
    entryPoint: metrics
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    network: plaglens-net
    exposedByDefault: false
    watch: true
  file:
    directory: /etc/traefik/dynamic
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${LETS_ENCRYPT_EMAIL}"
      storage: /etc/traefik/acme/acme.json
      # Dev: use the LE staging CA so we don't burn rate limits with self-issued
      # cert experiments. Switch to the production directory in prod overrides.
      caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: web
