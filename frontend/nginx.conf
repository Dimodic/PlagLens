# PlagLens Frontend — nginx site config
# - SPA fallback: any unknown path → index.html
# - Reverse proxy: /api/* → gateway service inside docker network

server {
    listen       80;
    server_name  _;
    server_tokens off;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/wasm image/svg+xml;
    gzip_min_length 1024;

    root   /usr/share/nginx/html;
    index  index.html;

    # Static assets — long-lived cache (Vite emits hashed names)
    location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|avif|ico|map)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Docker internal DNS — re-resolves upstreams every 30s so gateway IP changes
    # (e.g. when the container is recreated) don't poison the cache.
    resolver 127.0.0.11 ipv6=off valid=30s;

    # API proxy — to gateway service in compose network.
    # Use a variable in proxy_pass to force RUNTIME DNS resolution (defeats
    # nginx's start-up IP cache; otherwise gateway recreation breaks proxying).
    location /api/ {
        set                $gateway_upstream http://gateway:8000;
        proxy_pass         $gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
    }

    # SPA fallback — every other path → index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
