<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PlagLens — антиплагиат-платформа для программных заданий" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>PlagLens</title>
    <!--
      Blocking pre-paint theme script. The app's theme lives in
      localStorage (next-themes, key "theme"); the `dark` class is only
      added once the JS bundle mounts. Before that the browser paints the
      default white background → a flash on every reload for dark-mode
      users. We resolve the theme here, synchronously, and put the `dark`
      class on <html> before first paint — exactly mirroring next-themes'
      resolution (defaultTheme "light"; "system" follows the OS). The
      splash CSS below is then driven by that class, not by the OS
      `prefers-color-scheme`, so it can't mismatch the chosen theme.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var dark =
            t === 'dark' ||
            (t === 'system' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <!--
      Critical splash styles, inlined so they apply with the HTML instead
      of waiting for the JS entry to import global.css. Background is keyed
      off the `dark` class set by the script above — light by default,
      dark when the class is present — so reloads never flash white→dark.

      The splash shows the brand mark (P-lens glyph), gently pulsing —
      the SAME mark, size and position the React loading state uses
      (ProtectedRoute), so the HTML→React handoff is seamless: one steady
      logo, not a spinner-then-wordmark two-step.
    -->
    <style>
      html, body { margin: 0; padding: 0; height: 100%; }
      html { background: #ffffff; }
      html.dark { background: #0a0a0a; }
      body { background: transparent; }
      #root { min-height: 100%; }
      .pl-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .pl-splash svg {
        height: 44px;
        width: auto;
        color: #4f46e5;
        animation: pl-splash-pulse 1.2s ease-in-out infinite;
      }
      @keyframes pl-splash-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="pl-splash">
        <svg viewBox="28 16 48 68" fill="currentColor" role="img" aria-label="PlagLens">
          <path fill-rule="evenodd" d="M28 16 H50 a26 26 0 0 1 0 52 H42 V84 H28 Z M58 42 m-13 0 a13 13 0 1 0 26 0 a13 13 0 1 0 -26 0"></path>
        </svg>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
